{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block content %}
    <p class="fs-1">Create Account</p>
    {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}
    <div class="container">
        <form method="POST" action="{% url 'create_user' %}">
        {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" required class="form-control" placeholder="Enter Username">
            </div>
            <div class="form-group my-md-3">
                <label for="password">Password</label>
                <input type="password" name="password" required class="form-control" placeholder="Enter Password">
            </div>
            <input type="submit" value="Create Account" class="btn btn-primary my-md-3">
        </form>
    </div>
{% endblock %}
