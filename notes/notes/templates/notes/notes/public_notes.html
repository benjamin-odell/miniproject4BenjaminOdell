{% extends "base.html" %}
{% block title %}Public Notes{% endblock %}

{% block content %}
    <h1>Public Notes</h1>
    <div class="container">
        <div class="row">
            {% for note in notes %}
                <div class="card mx-3" style="width: 18rem;">
                    <div class="card-body">
                        <h5 class="card-title">{{ note.title }}</h5>
                        <h6 class="card-subtitle mb-2 text-body-secondary">{{ note.subject }}</h6>
                        <p class="card-text">{{ note.content }}</p>
                        <p class="card-text">{{ note.date }}</p>
                        <p class="card-text">{{ note.user.username }}</p>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>
{% endblock %}
