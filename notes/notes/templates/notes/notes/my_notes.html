{% extends "base.html" %}
{% block title %}Your Notes{% endblock %}

{% block content %}
    <h1>Your Notes</h1>
    <div class="container">
        <div class="row">
            {% for note in notes %}
                <div class="card mx-3" style="width: 18rem;">
                    <div class="card-body">
                        <h5 class="card-title">{{ note.title }}</h5>
                        <h6 class="card-subtitle mb-2 text-body-secondary">{{ note.subject }}</h6>
                        <p class="card-text">{{ note.content }}</p>
                        <a href="{% url 'edit_note' note.id %}" class="card-link" >Edit</a>
                        <a class="card-link btn btn-danger" data-bs-toggle="modal" data-bs-target="#delete_modal_{{ note.id }}">Delete</a>
                    </div>
                </div>

                <div class="modal fade" id="delete_modal_{{ note.id }}" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h1 class="modal-title fs-5" id="exampleModalLabel">Delete?</h1>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                Are you sure you want to delete this note?
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <a class="btn btn-danger" href="{% url 'delete_note' note.id %}">Delete</a>
                            </div>
                        </div>
                    </div>
                </div>

            {% endfor %}
        </div>
    </div>
{% endblock %}
